---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-observability-merlionos-org-v1-prometheuscluster
  failurePolicy: Fail
  name: vprometheuscluster.merlionos.org
  rules:
  - apiGroups:
    - observability.merlionos.org
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - prometheusclusters
  sideEffects: None
