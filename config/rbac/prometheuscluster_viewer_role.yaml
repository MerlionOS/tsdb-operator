# This rule is not used by the project tsdb-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to observability.merlionos.org resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: tsdb-operator
    app.kubernetes.io/managed-by: kustomize
  name: prometheuscluster-viewer-role
rules:
- apiGroups:
  - observability.merlionos.org
  resources:
  - prometheusclusters
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - observability.merlionos.org
  resources:
  - prometheusclusters/status
  verbs:
  - get
