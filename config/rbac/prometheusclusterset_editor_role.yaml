# This rule is not used by the project tsdb-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the observability.merlionos.org.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: tsdb-operator
    app.kubernetes.io/managed-by: kustomize
  name: prometheusclusterset-editor-role
rules:
- apiGroups:
  - observability.merlionos.org
  resources:
  - prometheusclustersets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - observability.merlionos.org
  resources:
  - prometheusclustersets/status
  verbs:
  - get
