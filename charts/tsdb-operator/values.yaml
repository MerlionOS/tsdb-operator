image:
  repository: ghcr.io/merlionos/tsdb-operator
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

leaderElection:
  enabled: true

features:
  ha: true
  backup: true
  api: true
  audit: false   # requires audit.dsnSecretRef when true

# Audit log (PostgreSQL). dsnSecretRef points at a Secret with key "dsn"
# holding a postgres:// URL. retentionDays = 0 keeps everything.
audit:
  dsnSecretRef: ""
  retentionDays: 0

# REST API server settings. When tls.enabled is true, cert-manager must be
# installed in the cluster and will issue a self-signed certificate into the
# operator's pod. Override issuerRef to use an existing issuer.
api:
  namespace: default   # namespace the API's list/create/delete operate on
  tls:
    enabled: false
    # Secret that contains tls.crt / tls.key. If unset and tls.certManager
    # is true, a cert-manager Certificate with this secret name is created.
    secretName: tsdb-operator-api-tls
    certManager:
      enabled: false
      issuerRef:
        kind: Issuer
        name: tsdb-operator-selfsigned

# S3 defaults used by the backup scheduler. Override per-cluster via the
# PrometheusCluster CRD's spec.backup.
s3:
  region: us-east-1
  endpoint: ""  # e.g. http://minio.minio.svc:9000 for MinIO
  # Name of a Secret with keys AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY.
  # Mounted via envFrom on the operator Deployment.
  credentialsSecretName: ""

# Install the PrometheusCluster CRD as part of the chart. Set to false if
# CRDs are managed out-of-band.
installCRDs: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

nodeSelector: {}
tolerations: []
affinity: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}

metrics:
  bindAddress: ":8443"
  secure: true
