apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "tsdb-operator.fullname" . }}-manager
  labels:
    {{- include "tsdb-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: ["observability.merlionos.org"]
    resources: ["prometheusclusters"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["observability.merlionos.org"]
    resources: ["prometheusclusters/status", "prometheusclusters/finalizers"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "tsdb-operator.fullname" . }}-manager
  labels:
    {{- include "tsdb-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "tsdb-operator.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "tsdb-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
