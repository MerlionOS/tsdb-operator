apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tsdb-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tsdb-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tsdb-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tsdb-operator.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "tsdb-operator.serviceAccountName" . }}
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --metrics-bind-address={{ .Values.metrics.bindAddress }}
            - --metrics-secure={{ .Values.metrics.secure }}
            - --leader-elect={{ .Values.leaderElection.enabled }}
            - --enable-ha={{ .Values.features.ha }}
            - --enable-backup={{ .Values.features.backup }}
            {{- if .Values.s3.region }}
            - --s3-region={{ .Values.s3.region }}
            {{- end }}
            {{- if .Values.s3.endpoint }}
            - --s3-endpoint={{ .Values.s3.endpoint }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: 8443
              protocol: TCP
            - name: healthz
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: healthz
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
