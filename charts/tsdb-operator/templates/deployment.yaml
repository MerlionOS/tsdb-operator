apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tsdb-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tsdb-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tsdb-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tsdb-operator.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "tsdb-operator.serviceAccountName" . }}
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --metrics-bind-address={{ .Values.metrics.bindAddress }}
            - --metrics-secure={{ .Values.metrics.secure }}
            - --leader-elect={{ .Values.leaderElection.enabled }}
            - --enable-ha={{ .Values.features.ha }}
            - --enable-backup={{ .Values.features.backup }}
            - --enable-api={{ .Values.features.api }}
            {{- if .Values.features.webhook }}
            - --enable-webhook=true
            - --webhook-cert-path=/etc/tsdb-operator/webhook-tls
            {{- end }}
            {{- if .Values.features.audit }}
            - --audit-retention-days={{ .Values.audit.retentionDays }}
            {{- end }}
            {{- if .Values.features.api }}
            - --api-namespace={{ .Values.api.namespace }}
            - --api-address=:8080
            {{- if .Values.api.tls.enabled }}
            - --api-tls-cert-dir=/etc/tsdb-operator/api-tls
            {{- end }}
            {{- end }}
            {{- if .Values.s3.region }}
            - --s3-region={{ .Values.s3.region }}
            {{- end }}
            {{- if .Values.s3.endpoint }}
            - --s3-endpoint={{ .Values.s3.endpoint }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: 8443
              protocol: TCP
            - name: healthz
              containerPort: 8081
              protocol: TCP
            {{- if .Values.features.api }}
            - name: api
              containerPort: 8080
              protocol: TCP
            {{- end }}
            {{- if .Values.features.webhook }}
            - name: webhook
              containerPort: 9443
              protocol: TCP
            {{- end }}
          {{- if or (and .Values.features.api .Values.api.tls.enabled) .Values.features.webhook }}
          volumeMounts:
            {{- if and .Values.features.api .Values.api.tls.enabled }}
            - name: api-tls
              mountPath: /etc/tsdb-operator/api-tls
              readOnly: true
            {{- end }}
            {{- if .Values.features.webhook }}
            - name: webhook-tls
              mountPath: /etc/tsdb-operator/webhook-tls
              readOnly: true
            {{- end }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: healthz
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- if or .Values.s3.credentialsSecretName (and .Values.features.audit .Values.audit.dsnSecretRef) }}
          env:
            {{- if and .Values.features.audit .Values.audit.dsnSecretRef }}
            - name: TSDB_AUDIT_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.audit.dsnSecretRef }}
                  key: dsn
            {{- end }}
          {{- end }}
          {{- if .Values.s3.credentialsSecretName }}
          envFrom:
            - secretRef:
                name: {{ .Values.s3.credentialsSecretName }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if or (and .Values.features.api .Values.api.tls.enabled) .Values.features.webhook }}
      volumes:
        {{- if and .Values.features.api .Values.api.tls.enabled }}
        - name: api-tls
          secret:
            secretName: {{ .Values.api.tls.secretName }}
        {{- end }}
        {{- if .Values.features.webhook }}
        - name: webhook-tls
          secret:
            secretName: {{ .Values.webhook.secretName }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
